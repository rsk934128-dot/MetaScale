# FusionPay Sovereign OS Deployment Configuration
# Optimized for high-velocity fintech operations

runConfig:
  minInstances: 0
  maxInstances: 10
  memory: 512Mi
  cpu: 1

env:
  - variable: NEXT_PUBLIC_KIND
    value: PRODUCTION
  - variable: NODE_ENV
    value: production

# Health Check configuration to ensure zero-downtime updates
healthCheck:
  path: /api/status
  initialDelaySeconds: 10
