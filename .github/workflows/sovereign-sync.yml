name: 🚀 Sovereign Mesh Sync

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  integrity-check:
    name: 🛡️ Integrity Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Run Linting
        run: npm run lint

      - name: Typecheck Mesh Logic
        run: npm run typecheck

  deployment-trigger:
    name: 🏗️ Deployment Pulse
    needs: integrity-check
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - name: Notify Sovereign Core
        run: |
          echo ">>> Code Integrity Verified."
          echo ">>> Triggering Automated Mesh Deployment via linked Hosting Provider (Firebase/Vercel)."
